name: Build & Deploy (Cloudflare Pages)

# Despliegue gratuito en Cloudflare Pages (ancho de banda ilimitado).
# - En cada push a main
# - Manualmente (workflow_dispatch)
# - Día 3 de cada mes (cron): reconstruye con los datos más recientes.
#   Es la "actualización automática" honesta: no es tiempo real, sino una
#   reconstrucción periódica con la última publicación oficial.
#
# Requiere 2 secrets en el repo (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   (token con permiso "Cloudflare Pages: Edit")
#   CLOUDFLARE_ACCOUNT_ID  (ID de cuenta de Cloudflare)

on:
  workflow_dispatch:
  # Refresco automático de NOTICIAS en el sitio Cloudflare en vivo, cada 2 horas.
  # (Secrets CLOUDFLARE_API_TOKEN y CLOUDFLARE_ACCOUNT_ID ya configurados.)
  schedule:
    - cron: "0 */2 * * *" # cada 2 horas

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      # Refresco horario: solo NOTICIAS (rápido y sin martillear los portales de
      # presupuestos, que cambian poco). El ETL completo de datos corre en el cron
      # de pages.yml y en ejecuciones manuales.
      - name: Actualizar noticias (ETL)
        run: npm run etl:news || echo "ETL noticias falló; se usa el dataset existente."

      - name: Build (export estático)
        run: npm run build

      - name: Deploy a Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy out --project-name=cuentas-claras --branch=main
