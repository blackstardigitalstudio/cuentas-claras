name: Build & Deploy (Cloudflare Pages)

# Despliegue gratuito en Cloudflare Pages (ancho de banda ilimitado).
# - En cada push a main
# - Manualmente (workflow_dispatch)
# - Día 3 de cada mes (cron): reconstruye con los datos más recientes.
#   Es la "actualización automática" honesta: no es tiempo real, sino una
#   reconstrucción periódica con la última publicación oficial.
#
# Requiere 2 secrets en el repo (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   (token con permiso "Cloudflare Pages: Edit")
#   CLOUDFLARE_ACCOUNT_ID  (ID de cuenta de Cloudflare)

on:
  # Manual por ahora: actívalo cuando hayas añadido los secrets de Cloudflare.
  # Cuando esté listo, puedes volver a añadir push/schedule.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      # Refresca los datos reales (descarga CSV de los portales open data).
      # Si una fuente falla, no abortamos: se reutiliza el JSON ya commiteado.
      - name: Actualizar datos (ETL)
        run: npm run etl || echo "ETL falló; se usa el dataset existente."

      - name: Build (export estático)
        run: npm run build

      - name: Deploy a Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy out --project-name=cuentas-claras --branch=main
