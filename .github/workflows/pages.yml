name: Deploy a GitHub Pages

# Despliegue gratuito e inmediato en GitHub Pages.
# URL: https://blackstardigitalstudio.github.io/cuentas-claras/
# (Para usar un dominio propio en Cloudflare, ver deploy.yml + DEPLOY.md.)

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Las noticias se sirven EN VIVO desde la función edge /api/news; este cron
    # solo refresca el respaldo estático (SEO / primer pintado) cada 3 horas.
    - cron: "0 */3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # Project page: el sitio se sirve bajo /cuentas-claras/
      NEXT_PUBLIC_BASE_PATH: /cuentas-claras
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Actualizar datos (ETL)
        run: npm run etl || echo "ETL falló; se usa el dataset existente."
      - name: Build (export estático)
        run: npm run build
      - name: Evita el procesado Jekyll
        run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Avisar a buscadores (IndexNow)
        run: node data/ping-indexnow.mjs || echo "IndexNow falló (no crítico)"
        env:
          SITE_URL: https://cuentas-claras-3cg.pages.dev
